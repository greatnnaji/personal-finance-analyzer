name: CI

env:
  # Opt into Node.js 24 for JavaScript actions to avoid deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies (uses lockfile when present)
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ] || [ -f yarn.lock ]; then
            npm ci
          else
            npm install
          fi
      - name: Run frontend tests
        run: npm test --silent
      - name: Build frontend (if present)
        run: npm run build --if-present

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Miniconda and environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          # Path is relative to the repository root (this action runs from the workspace)
          environment-file: environment.yml
          activate-environment: personalFinanceAnalyzer
          auto-activate: false

      - name: Debug: list repo files (optional)
        run: |
          echo "Repo root files:"
          ls -la ..

      - name: Ensure ruff installed
        run: pip install ruff

      - name: Run backend tests
        run: python -m pytest -v

      - name: Ruff lint (backend)
        run: ruff check .

      - name: Ruff format check (backend)
        run: ruff format --check .
