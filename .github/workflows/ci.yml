name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json  # ← tells it where to look
      - run: npm ci
      - run: npm test -- --watchAll=false --forceExit --passWithNoTests
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml   # ← root level, no prefix
          activate-environment: personalFinanceAnalyzer
          auto-activate-base: false
      - name: Install ruff
        shell: bash -el {0}
        run: pip install ruff
      - name: Run tests
        shell: bash -el {0}
        run: python -m pytest -v
      - name: Lint
        shell: bash -el {0}
        run: ruff check .
      - name: Check formatting
        shell: bash -el {0}
        run: ruff format --check .
